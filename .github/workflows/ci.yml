name: Build, Test, and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_rebuild_deps:
        description: 'Force rebuild dependencies (ignore cache)'
        type: boolean
        default: false

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  CACHE_VERSION: '1'

jobs:
  # =============================================
  # Phase 2: Build, Test, Distribute for Linux platforms
  # =============================================
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            docker_platform: linux/amd64
            needs_host_qt: true
            artifact_name: appimage-linux-x86_64
            artifact_path: .distribute/RickAndMortyViewer-x86_64.AppImage
            is_linux: true
            enabled: true
            timeout_deps: 240
            timeout_test: 30

          - platform: linux-arm64
            docker_platform: linux/arm64
            needs_host_qt: true
            artifact_name: appimage-linux-arm64
            artifact_path: .distribute/RickAndMortyViewer-aarch64.AppImage
            is_linux: true
            enabled: true
            timeout_deps: 600
            timeout_test: 60

    steps:
      # ===== Setup =====
      - name: Skip disabled matrix
        if: matrix.enabled != true
        run: echo "Matrix entry disabled; skipping."

      - uses: actions/checkout@v4
        if: matrix.enabled == true

      - name: Set up QEMU
        if: matrix.enabled == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: matrix.enabled == true
        uses: docker/setup-buildx-action@v3

      # ===== Cache Platform Dependencies =====
      - name: Restore ${{ matrix.platform }} cache
        id: cache-restore
        if: matrix.enabled == true
        uses: actions/cache/restore@v4
        with:
          path: |
            .lib-prebuilt/${{ matrix.platform }}/qt6
            .lib-prebuilt/${{ matrix.platform }}/curl
            .lib-prebuilt/${{ matrix.platform }}/glog
            .lib-prebuilt/${{ matrix.platform }}/json
            .lib-prebuilt/${{ matrix.platform }}/fonts
            .lib-prebuilt/${{ matrix.platform }}/.qt-stamp
            .lib-prebuilt/${{ matrix.platform }}/.curl-stamp
            .lib-prebuilt/${{ matrix.platform }}/.glog-stamp
            .lib-prebuilt/${{ matrix.platform }}/.json-stamp
          key: prebuilt-${{ matrix.platform }}-${{ github.ref_name }}-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}
          restore-keys: |
            prebuilt-${{ matrix.platform }}-master-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}
            prebuilt-${{ matrix.platform }}-master-
            prebuilt-${{ matrix.platform }}-

      - name: Validate ${{ matrix.platform }} cache
        id: validate-cache
        if: matrix.enabled == true && steps.cache-restore.outputs.cache-hit == 'true'
        run: |
          PLATFORM="${{ matrix.platform }}"
          ERRORS=0
          for stamp in .qt-stamp .curl-stamp .glog-stamp .json-stamp; do
            if [[ ! -f ".lib-prebuilt/${PLATFORM}/${stamp}" ]]; then
              echo "::warning::Missing stamp: ${stamp}"
              ERRORS=$((ERRORS + 1))
            fi
          done
          for dir in qt6 curl glog json; do
            if [[ ! -d ".lib-prebuilt/${PLATFORM}/${dir}" ]]; then
              echo "::warning::Missing dir: ${dir}"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [[ "${{ matrix.is_linux }}" == "true" ]]; then
            if [[ ! -f ".lib-prebuilt/${PLATFORM}/qt6/lib/cmake/Qt6CoreTools/Qt6CoreToolsConfig.cmake" ]]; then
              echo "::warning::Missing Qt6CoreTools config (host tools)"
              ERRORS=$((ERRORS + 1))
            fi
            if [[ ! -x ".lib-prebuilt/${PLATFORM}/qt6/libexec/moc" ]]; then
              echo "::warning::Missing Qt host tool: moc"
              ERRORS=$((ERRORS + 1))
            fi
          fi
          if [[ $ERRORS -gt 0 ]]; then
            echo "cache-valid=false" >> $GITHUB_OUTPUT
          else
            echo "cache-valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Download prebuilt (Linux fallback)
        id: linux-prebuilt
        if: matrix.enabled == true && matrix.is_linux == true && (steps.cache-restore.outputs.cache-hit != 'true' || steps.validate-cache.outputs.cache-valid != 'true') && !inputs.force_rebuild_deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          tmp="/tmp/lib-prebuilt-${platform}.tar.xz"
          if gh release download v0.0.1 -p "lib-prebuilt-${platform}.tar.xz" -D /tmp; then
            sudo rm -rf ".lib-prebuilt/${platform}"
            mkdir -p .lib-prebuilt
            tar -C .lib-prebuilt -xJf "$tmp"
            if [[ -f ".lib-prebuilt/${platform}/qt6/lib/cmake/Qt6CoreTools/Qt6CoreToolsConfig.cmake" && -x ".lib-prebuilt/${platform}/qt6/libexec/moc" ]]; then
              echo "deps-ready=true" >> $GITHUB_OUTPUT
            else
              echo "::warning::Prebuilt Qt missing host tools; rebuilding from source."
              sudo rm -rf ".lib-prebuilt/${platform}/qt6"
              sudo rm -f ".lib-prebuilt/${platform}/.qt-stamp"
            fi
          else
            echo "No prebuilt tar available for ${platform}; building from source."
          fi
          true

      - name: Ensure Qt tools executable
        if: matrix.enabled == true && matrix.is_linux == true
        run: |
          if [[ -d ".lib-prebuilt/${{ matrix.platform }}/qt6/libexec" ]]; then
            sudo chmod -R a+rx ".lib-prebuilt/${{ matrix.platform }}/qt6/libexec"
          fi

      # ===== Step 1: Build Dependencies =====
      - name: Build ${{ matrix.platform }} dependencies
        id: build-deps
        if: matrix.enabled == true && (steps.cache-restore.outputs.cache-hit != 'true' || steps.validate-cache.outputs.cache-valid != 'true' || inputs.force_rebuild_deps)
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild_deps }}
        run: |
          if [[ "${FORCE_REBUILD}" != "true" && "${{ steps.linux-prebuilt.outputs.deps-ready }}" == "true" ]]; then
            echo "Using downloaded prebuilt deps"
            exit 0
          fi
          docker compose run --rm deps-${{ matrix.platform }}
          # Clean build artifacts (root-owned files from Docker)
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/qt6-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/qt6-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/curl-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/curl-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/glog-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/glog-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/json-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/json-src
          echo "deps-built=true" >> $GITHUB_OUTPUT
        timeout-minutes: ${{ matrix.timeout_deps }}

      - name: Upload host Qt (linux-x86_64)
        if: matrix.enabled == true && matrix.platform == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: host-qt-linux-x86_64
          path: .lib-prebuilt/linux-x86_64/qt6
          retention-days: 1

      # ===== Step 2: Build Application =====
      - name: Build ${{ matrix.platform }} application
        if: matrix.enabled == true
        run: docker compose run --rm app-${{ matrix.platform }}
        timeout-minutes: 60

      # ===== Step 3: Build Tests =====
      - name: Build ${{ matrix.platform }} tests
        if: matrix.enabled == true
        run: docker compose run --rm test-build-${{ matrix.platform }}
        timeout-minutes: 30

      # ===== Step 4: Run Tests (GATE) =====
      - name: Run ${{ matrix.platform }} tests
        id: run-tests
        if: matrix.enabled == true
        run: |
          mkdir -p test-results
          docker compose run --rm test-run-${{ matrix.platform }}
          echo "tests-passed=true" >> $GITHUB_OUTPUT
        timeout-minutes: ${{ matrix.timeout_test }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: matrix.enabled == true && always()
        with:
          name: test-results-${{ matrix.platform }}
          path: test-results/*.xml
          retention-days: 30

      # ===== Step 5: Create Distribution (only if tests pass) =====
      - name: Create ${{ matrix.platform }} distribution
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        run: |
          docker compose run --rm distribute-${{ matrix.platform }}
          if [ "${{ matrix.is_linux }}" = "true" ]; then
            docker compose run --rm appimage-${{ matrix.platform }}
          else
            docker compose run --rm package-${{ matrix.platform }}
          fi

      # ===== Step 6: Upload Artifact =====
      - name: Upload ${{ matrix.platform }} artifact
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

      # ===== Step 7: Save Cache (only after tests pass AND deps were rebuilt) =====
      - name: Save ${{ matrix.platform }} cache
        if: matrix.enabled == true && steps.build-deps.outputs.deps-built == 'true' && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .lib-prebuilt/${{ matrix.platform }}/qt6
            .lib-prebuilt/${{ matrix.platform }}/curl
            .lib-prebuilt/${{ matrix.platform }}/glog
            .lib-prebuilt/${{ matrix.platform }}/json
            .lib-prebuilt/${{ matrix.platform }}/fonts
            .lib-prebuilt/${{ matrix.platform }}/.qt-stamp
            .lib-prebuilt/${{ matrix.platform }}/.curl-stamp
            .lib-prebuilt/${{ matrix.platform }}/.glog-stamp
            .lib-prebuilt/${{ matrix.platform }}/.json-stamp
          key: prebuilt-${{ matrix.platform }}-${{ github.ref_name }}-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}

      - name: Create prebuilt tarball
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        run: docker compose run --rm prebuilt-${{ matrix.platform }}

      - name: Upload prebuilt tarball
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.platform }}
          path: .lib-prebuilt/lib-prebuilt-${{ matrix.platform }}.tar.xz
          retention-days: 90

  # =============================================
  # Phase 2: Build, Test, Distribute for Windows platforms
  # Requires host Qt from build-linux (linux-x86_64)
  # =============================================
  build-windows:
    runs-on: ubuntu-latest
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x86_64
            docker_platform: linux/amd64
            needs_host_qt: true
            artifact_name: dist-windows-x86_64
            artifact_path: .distribute/RickAndMortyViewer-windows-x86_64.zip
            is_linux: false
            enabled: true
            timeout_deps: 240
            timeout_test: 30

          - platform: windows-arm64
            docker_platform: linux/arm64
            needs_host_qt: true
            artifact_name: dist-windows-arm64
            artifact_path: .distribute/RickAndMortyViewer-windows-arm64.zip
            is_linux: false
            enabled: true
            timeout_deps: 300
            timeout_test: 90

    steps:
      # ===== Setup =====
      - name: Skip disabled matrix
        if: matrix.enabled != true
        run: echo "Matrix entry disabled; skipping."

      - uses: actions/checkout@v4
        if: matrix.enabled == true

      - name: Set up QEMU
        if: matrix.enabled == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: matrix.enabled == true
        uses: docker/setup-buildx-action@v3

      # ===== Cache Platform Dependencies =====
      - name: Restore ${{ matrix.platform }} cache
        id: cache-restore
        if: matrix.enabled == true
        uses: actions/cache/restore@v4
        with:
          path: |
            .lib-prebuilt/${{ matrix.platform }}/qt6
            .lib-prebuilt/${{ matrix.platform }}/curl
            .lib-prebuilt/${{ matrix.platform }}/glog
            .lib-prebuilt/${{ matrix.platform }}/json
            .lib-prebuilt/${{ matrix.platform }}/fonts
            .lib-prebuilt/${{ matrix.platform }}/.qt-stamp
            .lib-prebuilt/${{ matrix.platform }}/.curl-stamp
            .lib-prebuilt/${{ matrix.platform }}/.glog-stamp
            .lib-prebuilt/${{ matrix.platform }}/.json-stamp
          key: prebuilt-${{ matrix.platform }}-${{ github.ref_name }}-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}
          restore-keys: |
            prebuilt-${{ matrix.platform }}-master-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}
            prebuilt-${{ matrix.platform }}-master-
            prebuilt-${{ matrix.platform }}-

      - name: Validate ${{ matrix.platform }} cache
        id: validate-cache
        if: matrix.enabled == true && steps.cache-restore.outputs.cache-hit == 'true'
        run: |
          PLATFORM="${{ matrix.platform }}"
          ERRORS=0
          for stamp in .qt-stamp .curl-stamp .glog-stamp .json-stamp; do
            if [[ ! -f ".lib-prebuilt/${PLATFORM}/${stamp}" ]]; then
              echo "::warning::Missing stamp: ${stamp}"
              ERRORS=$((ERRORS + 1))
            fi
          done
          for dir in qt6 curl glog json; do
            if [[ ! -d ".lib-prebuilt/${PLATFORM}/${dir}" ]]; then
              echo "::warning::Missing dir: ${dir}"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [[ $ERRORS -gt 0 ]]; then
            echo "cache-valid=false" >> $GITHUB_OUTPUT
          else
            echo "cache-valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Download host Qt (linux-x86_64)
        if: matrix.enabled == true
        uses: actions/download-artifact@v4
        with:
          name: host-qt-linux-x86_64
          path: .lib-prebuilt/linux-x86_64/qt6

      - name: Ensure host Qt tools executable
        if: matrix.enabled == true
        run: |
          if [[ -d ".lib-prebuilt/linux-x86_64/qt6/libexec" ]]; then
            sudo chmod -R a+rx ".lib-prebuilt/linux-x86_64/qt6/libexec"
          fi

      - name: Download prebuilt (Windows fallback)
        id: windows-prebuilt
        if: matrix.enabled == true && (steps.cache-restore.outputs.cache-hit != 'true' || steps.validate-cache.outputs.cache-valid != 'true') && !inputs.force_rebuild_deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          tmp="/tmp/lib-prebuilt-${platform}.tar.xz"
          if gh release download v0.0.1 -p "lib-prebuilt-${platform}.tar.xz" -D /tmp; then
            sudo rm -rf ".lib-prebuilt/${platform}"
            mkdir -p .lib-prebuilt
            tar -C .lib-prebuilt -xJf "$tmp"
            echo "deps-ready=true" >> $GITHUB_OUTPUT
          else
            echo "No prebuilt tar available for ${platform}; building from source."
          fi
          true

      # ===== Step 1: Build Dependencies =====
      - name: Build ${{ matrix.platform }} dependencies
        id: build-deps
        if: matrix.enabled == true && (steps.cache-restore.outputs.cache-hit != 'true' || steps.validate-cache.outputs.cache-valid != 'true' || inputs.force_rebuild_deps)
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild_deps }}
        run: |
          if [[ "${FORCE_REBUILD}" != "true" && "${{ steps.windows-prebuilt.outputs.deps-ready }}" == "true" ]]; then
            echo "Using downloaded prebuilt deps"
            exit 0
          fi
          docker compose run --rm deps-${{ matrix.platform }}
          # Clean build artifacts (root-owned files from Docker)
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/qt6-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/qt6-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/curl-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/curl-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/glog-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/glog-src
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/json-build
          sudo rm -rf .lib-prebuilt/${{ matrix.platform }}/json-src
          echo "deps-built=true" >> $GITHUB_OUTPUT
        timeout-minutes: ${{ matrix.timeout_deps }}

      # ===== Step 2: Build Application =====
      - name: Build ${{ matrix.platform }} application
        if: matrix.enabled == true
        run: docker compose run --rm app-${{ matrix.platform }}
        timeout-minutes: 60

      # ===== Step 3: Build Tests =====
      - name: Build ${{ matrix.platform }} tests
        if: matrix.enabled == true
        run: docker compose run --rm test-build-${{ matrix.platform }}
        timeout-minutes: 30

      # ===== Step 4: Run Tests (GATE) =====
      - name: Run ${{ matrix.platform }} tests
        id: run-tests
        if: matrix.enabled == true
        run: |
          mkdir -p test-results
          docker compose run --rm test-run-${{ matrix.platform }}
          echo "tests-passed=true" >> $GITHUB_OUTPUT
        timeout-minutes: ${{ matrix.timeout_test }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: matrix.enabled == true && always()
        with:
          name: test-results-${{ matrix.platform }}
          path: test-results/*.xml
          retention-days: 30

      # ===== Step 5: Create Distribution (only if tests pass) =====
      - name: Create ${{ matrix.platform }} distribution
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        run: |
          docker compose run --rm distribute-${{ matrix.platform }}
          docker compose run --rm package-${{ matrix.platform }}

      # ===== Step 6: Upload Artifact =====
      - name: Upload ${{ matrix.platform }} artifact
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

      # ===== Step 7: Save Cache (only after tests pass AND deps were rebuilt) =====
      - name: Save ${{ matrix.platform }} cache
        if: matrix.enabled == true && steps.build-deps.outputs.deps-built == 'true' && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .lib-prebuilt/${{ matrix.platform }}/qt6
            .lib-prebuilt/${{ matrix.platform }}/curl
            .lib-prebuilt/${{ matrix.platform }}/glog
            .lib-prebuilt/${{ matrix.platform }}/json
            .lib-prebuilt/${{ matrix.platform }}/fonts
            .lib-prebuilt/${{ matrix.platform }}/.qt-stamp
            .lib-prebuilt/${{ matrix.platform }}/.curl-stamp
            .lib-prebuilt/${{ matrix.platform }}/.glog-stamp
            .lib-prebuilt/${{ matrix.platform }}/.json-stamp
          key: prebuilt-${{ matrix.platform }}-${{ github.ref_name }}-${{ hashFiles('.github/cache-inputs.txt') }}-v${{ env.CACHE_VERSION }}

      - name: Create prebuilt tarball
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        run: docker compose run --rm prebuilt-${{ matrix.platform }}

      - name: Upload prebuilt tarball
        if: matrix.enabled == true && steps.run-tests.outputs.tests-passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.platform }}
          path: .lib-prebuilt/lib-prebuilt-${{ matrix.platform }}.tar.xz
          retention-days: 90

  # =============================================
  # Phase 3: Release (requires ALL platforms to pass)
  # =============================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify all platforms built
        run: |
          MISSING=0
          for platform in linux-x86_64 linux-arm64 windows-x86_64 windows-arm64; do
            if [[ ! -f "artifacts/prebuilt-${platform}/lib-prebuilt-${platform}.tar.xz" ]]; then
              echo "::error::Missing artifact for ${platform}"
              MISSING=$((MISSING + 1))
            fi
          done
          for platform in windows-x86_64 windows-arm64; do
            if [[ ! -f "artifacts/dist-${platform}/RickAndMortyViewer-${platform}.zip" ]]; then
              echo "::error::Missing Windows dist artifact for ${platform}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [[ $MISSING -gt 0 ]]; then
            echo "::error::Cannot release - ${MISSING} platform(s) failed"
            exit 1
          fi
          echo "All platforms built successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/appimage-linux-x86_64/RickAndMortyViewer-x86_64.AppImage
            artifacts/appimage-linux-arm64/RickAndMortyViewer-aarch64.AppImage
            artifacts/dist-windows-x86_64/RickAndMortyViewer-windows-x86_64.zip
            artifacts/dist-windows-arm64/RickAndMortyViewer-windows-arm64.zip
            artifacts/prebuilt-linux-x86_64/lib-prebuilt-linux-x86_64.tar.xz
            artifacts/prebuilt-linux-arm64/lib-prebuilt-linux-arm64.tar.xz
            artifacts/prebuilt-windows-x86_64/lib-prebuilt-windows-x86_64.tar.xz
            artifacts/prebuilt-windows-arm64/lib-prebuilt-windows-arm64.tar.xz
